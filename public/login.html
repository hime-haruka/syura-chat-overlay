<!doctype html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CHZZK 채팅 오버레이 로그인</title>
  <style>
    *{box-sizing:border-box}body{margin:0;min-height:100vh;font-family:system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;background:#0c1018;color:#fff;padding:24px}.wrap{display:grid;grid-template-columns:minmax(360px,520px) 1fr;gap:20px;align-items:start}.card,.preview{background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.14);border-radius:24px;padding:24px;box-shadow:0 20px 70px rgba(0,0,0,.3)}h1{margin:0 0 8px;font-size:26px}p{color:rgba(255,255,255,.76);line-height:1.6}label{display:block;margin:16px 0 8px;color:rgba(255,255,255,.72);font-weight:800}input{width:100%;padding:13px 15px;border:1px solid rgba(255,255,255,.16);border-radius:14px;background:rgba(0,0,0,.28);color:#fff;font:inherit}.buttons{display:flex;flex-wrap:wrap;gap:10px;margin-top:18px}button,a.button{border:0;border-radius:999px;padding:12px 17px;font:inherit;font-weight:900;cursor:pointer;color:#08100c;background:#00ffa3;text-decoration:none;display:inline-flex;align-items:center;justify-content:center;min-height:44px}button.secondary,a.secondary{background:rgba(255,255,255,.14);color:#fff}button.warn{background:#ffd166}.status{margin-top:18px;padding:14px;border-radius:16px;background:rgba(0,0,0,.24);white-space:pre-wrap;color:rgba(255,255,255,.84);min-height:90px;font-family:ui-monospace,SFMono-Regular,Menlo,Consolas,monospace;font-size:13px}code{color:#8fffd0;word-break:break-all}iframe{width:100%;height:720px;border:0;border-radius:18px;background:transparent}.hint{font-size:13px;color:rgba(255,255,255,.62)}@media(max-width:960px){.wrap{grid-template-columns:1fr}iframe{height:520px}}
  </style>
</head>
<body>
  <main class="wrap">
    <section class="card">
      <h1>CHZZK 채팅 오버레이 로그인</h1>
      <p>클라이언트가 이 페이지에서 로그인하고, 방송 전 테스트 버튼으로 디자인을 바로 확인할 수 있습니다.</p>
      <label for="clientId">클라이언트 ID</label>
      <input id="clientId" autocomplete="off" />
      <p>OBS 브라우저 소스 URL<br><code id="obsUrl"></code></p>
      <div class="buttons">
        <a id="loginButton" class="button" href="#">치지직 로그인</a>
        <button id="connectButton" class="secondary">채팅 연결 시작</button>
        <button id="testChatButton" class="warn">테스트 채팅</button>
        <button id="testVipButton" class="warn">VIP 테스트</button>
        <button id="testSubButton" class="warn">구독자 테스트</button>
        <button id="testModButton" class="warn">매니저 테스트</button>
        <button id="testDonationButton" class="warn">치즈 테스트</button>
        <a id="openOverlayButton" class="button secondary" href="#" target="_blank" rel="noreferrer">오버레이 새 창</a>
        <a id="debugButton" class="button secondary" href="#" target="_blank" rel="noreferrer">디버그 열기</a>
      </div>
      <div id="status" class="status">준비 중...</div>
      <p class="hint">테스트 버튼은 로그인 성공 여부와 관계없이 오른쪽 미리보기/OBS URL에 바로 표시됩니다.</p>
    </section>
    <section class="preview">
      <h1>디자인 미리보기</h1>
      <p class="hint">아래 화면이 OBS 브라우저 소스와 같은 /chat/:clientId 입니다.</p>
      <iframe id="previewFrame" allow="autoplay"></iframe>
    </section>
  </main>
  <script src="/socket.io/socket.io.js"></script>
  <script>
    const $ = (s) => document.querySelector(s);
    const clientInput=$('#clientId'), loginButton=$('#loginButton'), connectButton=$('#connectButton'), testChatButton=$('#testChatButton'), testVipButton=$('#testVipButton'), testSubButton=$('#testSubButton'), testModButton=$('#testModButton'), testDonationButton=$('#testDonationButton'), openOverlayButton=$('#openOverlayButton'), debugButton=$('#debugButton'), obsUrl=$('#obsUrl'), statusBox=$('#status'), previewFrame=$('#previewFrame');
    const pathClientId = location.pathname.split('/').filter(Boolean).pop();
    clientInput.value = pathClientId && pathClientId !== 'login' ? pathClientId : 'pop';
    let socket;
    function clientId(){return clientInput.value.trim()||'pop'}
    function print(v){statusBox.textContent=JSON.stringify(v,null,2)}
    function refreshLinks(){const id=encodeURIComponent(clientId());obsUrl.textContent=`${location.origin}/chat/${id}`;loginButton.href=`/auth/chzzk?clientId=${id}`;openOverlayButton.href=`/chat/${id}`;debugButton.href=`/debug/${id}`;previewFrame.src=`/chat/${id}?debug=1&preview=${Date.now()}`;history.replaceState(null,'',`/login/${id}`)}
    function bindSocket(){if(socket)socket.disconnect();socket=io({query:{clientId:clientId()}});socket.on('chzzk:status',print);socket.on('connect',()=>loadStatus())}
    async function post(url,body={}){const res=await fetch(url,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(body)});const json=await res.json();print(json);return json}
    async function loadStatus(){const res=await fetch(`/api/auth/status/${encodeURIComponent(clientId())}`);print(await res.json())}
    async function sendChat(role,message,nickname='치지직테스트'){const payload={nickname,role,message,emotes:[{code:'{:d_51:}',name:'{:d_51:}',url:'https://ssl.pstatic.net/static/nng/glive/icon/d_51.png'}]}; previewFrame.contentWindow?.__CHZZK_SE_TEST_CHAT?.(payload); return post(`/api/test/chat/${encodeURIComponent(clientId())}`,payload)}
    clientInput.addEventListener('change',()=>{refreshLinks();bindSocket()});
    connectButton.addEventListener('click',()=>post(`/api/connect/${encodeURIComponent(clientId())}`));
    testChatButton.addEventListener('click',()=>sendChat('streamer','방송 전 디자인 확인용 테스트 채팅입니다 {:d_51:}','스트리머테스트'));
    testVipButton.addEventListener('click',()=>sendChat('follower','VIP 스타일 테스트 채팅입니다','VIP테스트'));
    testSubButton.addEventListener('click',()=>sendChat('subscriber','구독자 스타일 테스트 채팅입니다','구독자테스트'));
    testModButton.addEventListener('click',()=>sendChat('manager','매니저 스타일 테스트 채팅입니다','매니저테스트'));
    testDonationButton.addEventListener('click',()=>{const payload={nickname:'치즈테스트',amount:1000,message:'방송 전 치즈 알림 테스트입니다'}; previewFrame.contentWindow?.__CHZZK_SE_TEST_DONATION?.(payload); post(`/api/test/donation/${encodeURIComponent(clientId())}`,payload)});
    refreshLinks();bindSocket();
  </script>
</body>
</html>
