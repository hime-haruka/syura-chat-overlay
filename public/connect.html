<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>치지직 채팅 연결</title>
  <style>
    *{box-sizing:border-box}
    body{margin:0;min-height:100vh;font-family:system-ui,-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#f5f6fb;color:#222;display:flex;align-items:center;justify-content:center;padding:24px}
    .card{width:min(760px,100%);background:#fff;border:1px solid #e7e8ef;border-radius:24px;box-shadow:0 16px 48px rgba(35,30,70,.1);padding:28px}
    .top{display:flex;justify-content:space-between;gap:16px;align-items:flex-start}
    .badge{padding:6px 10px;border-radius:999px;background:#eef7ef;color:#287339;font-weight:700;font-size:13px}
    .title{font-size:24px;font-weight:800;margin:0 0 8px}
    .desc{color:#666;line-height:1.55;margin:0 0 22px}
    .grid{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:10px;margin:18px 0}
    .box{padding:14px;border-radius:16px;background:#f8f8fc;border:1px solid #e8e8f0}
    .label{font-size:12px;color:#777}
    .value{font-size:14px;font-weight:700;word-break:break-all;margin-top:4px}
    .actions{display:flex;gap:10px;flex-wrap:wrap;margin:18px 0}
    button,a.btn{border:0;border-radius:14px;padding:12px 16px;font-weight:800;cursor:pointer;text-decoration:none;display:inline-flex;align-items:center;justify-content:center}
    .primary{background:#222;color:#fff}.secondary{background:#edeefa;color:#333}.danger{background:#fff0f0;color:#c02020;border:1px solid #ffd4d4}.ghost{background:#f5f5f8;color:#333}
    .log{margin-top:16px;max-height:280px;overflow:auto;background:#10121a;color:#d7e1ff;border-radius:16px;padding:14px;font-family:ui-monospace,SFMono-Regular,Consolas,monospace;font-size:12px;white-space:pre-wrap}
    .hint{font-size:13px;color:#777;margin-top:10px}
    @media(max-width:700px){.grid{grid-template-columns:1fr}.top{display:block}}
  </style>
</head>
<body>
  <main class="card">
    <div class="top">
      <div>
        <h1 class="title">치지직 채팅 연결</h1>
        <p class="desc">로그인 후 연결을 시작하세요. OBS에는 아래 OBS 주소만 넣으면 됩니다.</p>
      </div>
      <div class="badge" id="statusBadge">확인 중</div>
    </div>

    <div class="grid">
      <div class="box"><div class="label">클라이언트</div><div class="value" id="clientIdValue">-</div></div>
      <div class="box"><div class="label">로그인</div><div class="value" id="hasToken">-</div></div>
      <div class="box"><div class="label">채널</div><div class="value" id="channel">-</div></div>
      <div class="box"><div class="label">OBS 주소</div><div class="value" id="obsUrl">-</div></div>
    </div>

    <div class="actions">
      <a class="btn primary" id="loginBtn" href="#">치지직 로그인</a>
      <button class="secondary" id="startBtn" type="button">연결 시작</button>
      <button class="ghost" id="testBtn" type="button">비팔로워 테스트</button>
      <button class="ghost" id="testFollowerBtn" type="button">팔로워 테스트</button>
      <button class="ghost" id="testSubBtn" type="button">구독자 테스트</button>
      <button class="ghost" id="testBroadcasterBtn" type="button">스트리머 테스트</button>
      <button class="ghost" id="testModBtn" type="button">매니저 테스트</button>
      <button class="ghost" id="testDonationBtn" type="button">도네이션 테스트</button>
      <button class="secondary" id="stopBtn" type="button">연결 중지</button>
      <button class="danger" id="logoutBtn" type="button">로그아웃 / 연결 초기화</button>
    </div>

    <div class="hint">테스트 버튼은 OBS 주소(/chat/클라이언트)가 열린 상태에서 화면에 표시됩니다.</div>
    <div class="log" id="log">로딩 중...</div>
  </main>

<script>
(() => {
  'use strict';
  const qs = (id) => document.getElementById(id);
  const parts = location.pathname.split('/').filter(Boolean);
  const clientId = String(parts[parts.length - 1] || 'pop').trim() || 'pop';

  function setText(id, value) {
    const el = qs(id);
    if (el) el.textContent = value == null ? '-' : String(value);
  }

  function safeBind(id, handler) {
    const el = qs(id);
    if (!el) {
      console.warn('[connect] missing button #' + id);
      return;
    }
    el.addEventListener('click', async (event) => {
      event.preventDefault();
      try {
        await handler();
      } catch (err) {
        console.error(err);
        alert('테스트 전송 실패: ' + (err && err.message ? err.message : err));
      }
    });
  }

  async function call(method, url, body) {
    const res = await fetch(url, {
      method,
      headers: { 'Content-Type': 'application/json' },
      body: body ? JSON.stringify(body) : undefined
    });
    const text = await res.text();
    let data = {};
    try { data = text ? JSON.parse(text) : {}; } catch { data = { raw: text }; }
    if (!res.ok) throw new Error(data.error || data.message || data.raw || JSON.stringify(data));
    return data;
  }

  function render(s) {
    setText('clientIdValue', s.clientId || clientId);
    setText('hasToken', s.hasToken ? '로그인됨' : '로그인 필요');
    setText('channel', s.channelName ? `${s.channelName} (${s.channelId || '-'})` : (s.channelId || '-'));
    setText('obsUrl', s.obsUrl || `/chat/${clientId}`);
    setText('statusBadge', s.status || 'idle');
    const lines = [JSON.stringify({
      clientId: s.clientId || clientId,
      hasToken: s.hasToken,
      status: s.status,
      channelId: s.channelId,
      channelName: s.channelName,
      sessionKey: s.sessionKey,
      lastError: s.lastError,
      obsUrl: s.obsUrl
    }, null, 2), '\n--- 최근 로그 ---'];
    for (const d of (s.debug || [])) lines.push(`[${d.at}] ${d.message}${d.extra ? `\n${JSON.stringify(d.extra, null, 2)}` : ''}`);
    setText('log', lines.join('\n'));
  }

  async function refresh() {
    render(await call('GET', `/api/status/${encodeURIComponent(clientId)}`));
  }

  async function sendTest(type, payload) {
    const result = await call('POST', `/api/test/${encodeURIComponent(clientId)}`, { type, ...payload });
    console.log('[connect test emitted]', result);
    await refresh();
  }

  const loginBtn = qs('loginBtn');
  if (loginBtn) loginBtn.href = `/auth/chzzk/start/${encodeURIComponent(clientId)}`;

  safeBind('startBtn', async () => render(await call('POST', `/api/start/${encodeURIComponent(clientId)}`)));
  safeBind('stopBtn', async () => render(await call('POST', `/api/stop/${encodeURIComponent(clientId)}`)));
  safeBind('logoutBtn', async () => {
    if (!confirm('로그아웃하면 현재 연결과 저장된 토큰이 초기화됩니다. 계속할까요?')) return;
    render(await call('POST', `/api/logout/${encodeURIComponent(clientId)}`));
  });

  safeBind('testBtn', () => sendTest('chat', { role: 'default', nickname: '비팔로워', message: '비팔로워 테스트 메시지입니다!' }));
  safeBind('testFollowerBtn', () => sendTest('chat', { role: 'follower', nickname: '팔로워', message: '팔로워 테스트 메시지입니다!' }));
  safeBind('testSubBtn', () => sendTest('chat', { role: 'subscriber', nickname: '구독자', message: '구독자 테스트 메시지입니다!' }));
  safeBind('testBroadcasterBtn', () => sendTest('chat', { role: 'broadcaster', nickname: '스트리머', message: '스트리머 테스트 메시지입니다!' }));
  safeBind('testModBtn', () => sendTest('chat', { role: 'moderator', nickname: '매니저', message: '매니저 테스트 메시지입니다!' }));
  safeBind('testDonationBtn', () => sendTest('donation', { nickname: '후원테스트', amount: 12000, amountText: '₩12,000', message: '도네이션 테스트 메시지입니다!' }));

  refresh().catch((err) => {
    console.error(err);
    setText('log', '상태 조회 실패: ' + (err && err.message ? err.message : err));
  });
  setInterval(() => refresh().catch(() => {}), 3000);
})();
</script>
</body>
</html>
